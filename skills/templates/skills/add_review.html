{% extends "skills/base.html" %}

{% block content %}
    <h1>Review for {{ booking.listing.title }}</h1>
    <form method="POST">
        {% csrf_token %}
        <div>
            <label>Rating (1-5):</label>
            <input type="number" name="rating" min="1" max="5" required>
        </div>
        <div>
            <label>Comment:</label>
            <textarea name="comment" required></textarea>
        </div>
        <button type="submit" class="btn-warning">Submit Review</button>
    </form>
{% endblock %}
